name: robotics-control-mcp
description: 'IoT and robotics interface: list devices, send serial/HTTP commands,
  read sensors, control servos, s'
version: 1.0.0
tools:
- name: list_devices
  description: List all available devices. Auto-discovers serial ports (USB, Arduino,
  parameters: []
- name: send_command
  description: Send a text command to a device and get its response.
  parameters:
  - name: device
    type: string
    required: true
  - name: command
    type: string
    required: true
  - name: connection_type
    type: string
    required: false
  - name: baudrate
    type: integer
    required: false
  - name: timeout
    type: number
    required: false
- name: read_sensor
  description: Read a sensor value from a connected device. Sends a READ command
  parameters:
  - name: device
    type: string
    required: true
  - name: sensor_id
    type: string
    required: false
  - name: connection_type
    type: string
    required: false
  - name: baudrate
    type: integer
    required: false
- name: set_servo
  description: Set a servo motor to a specific angle.
  parameters:
  - name: device
    type: string
    required: true
  - name: channel
    type: integer
    required: true
  - name: angle
    type: number
    required: true
  - name: speed
    type: integer
    required: false
  - name: connection_type
    type: string
    required: false
  - name: baudrate
    type: integer
    required: false
- name: run_gcode
  description: Send G-code commands to a CNC machine, 3D printer, or robot arm.
  parameters:
  - name: device
    type: string
    required: true
  - name: gcode
    type: string
    required: true
  - name: connection_type
    type: string
    required: false
  - name: baudrate
    type: integer
    required: false
- name: emergency_stop
  description: Activate or release emergency stop. When active, ALL commands to ALL
  parameters:
  - name: device
    type: string
    required: false
  - name: release
    type: boolean
    required: false
